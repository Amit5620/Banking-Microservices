
# --- App ---
spring.application.name=accountsapi
server.port=8082

# --- Datasource (customers_db) ---
spring.datasource.url=jdbc:mysql://localhost:3306/accounts_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Amit@558#411
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP ---
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# --- JPA/Hibernate ---
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- Security: Keycloak JWT ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/master

# --- Swagger/OpenAPI ---
keycloak.issuer=http://localhost:8080/realms/master
keycloak.realm=master
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true


serviceUrl= http://localhost:8081/customers/v1.0
gatewayUrl= http://localhost:7060/token/developer

#eureka client config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
#logging level